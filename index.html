<body>

<div class="login-container">
    <h1>Connexion</h1>
    <div id="error" class="error-message"></div>
    <form id="loginForm">
        <div class="form-group">
            <label for="username">Nom d'utilisateur</label>
            <input type="text" id="username" name="user_id" required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" id="submitBtn">Se connecter</button>
    </form>

    <div class="register-area">
        <p>Pas encore de compte ?</p>
        <a href="https://world.openfoodfacts.org/cgi/user.pl" target="_blank" class="btn-register">S'inscrire sur Open Food Facts</a>
    </div>
</div>
